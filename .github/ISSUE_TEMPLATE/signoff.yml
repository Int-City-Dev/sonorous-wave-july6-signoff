name: July 6 email sign-off (quick)
description: Approve Jul 6 emails — check only what needs changing
title: "[Jul 6 Sign-off] "
labels:
  - signoff
body:
  - type: markdown
    attributes:
      value: |
        **Quick sign-off** — leave items blank if defaults are OK.
        Defaults: $15 GA · Wed "4 days out" · door price urgency · bio signup · E1–E4 subjects A · doors 7:30 · Back 2 The Feature

  - type: input
    id: submitter
    attributes:
      label: Your name
      placeholder: Ahmad
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: Changes only (leave blank if all good)
      description: "One line per change. Examples: Door is $15 not higher · Wed → 5 days out · Subjects E1-B,E2-A · Add show 8:08pm · Compete URL https://..."

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
